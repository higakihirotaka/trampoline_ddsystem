    // プレビューテーブル描画
    const tbody = document.getElementById('preview-table');
    SKILLS.forEach((s, i) => {
        tbody.innerHTML += `<tr>
            <td>${i}</td><td>${s.symbol}</td><td>${s.dd}</td>
            <td>${s.isTriple ? '✓' : ''}</td><td>${s.direction}</td>
        </tr>`;
    });

    function log(msg, cls = '') {
        const el = document.getElementById('log');
        el.innerHTML += `<div class="${cls}">${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    window.runMigration = async function() {
        const btn = document.querySelector('button');
        btn.disabled = true;
        document.getElementById('log').innerHTML = '';
        log(`アップロード開始: ${SKILLS.length} 件`, 'info');

        try {
            const batch = writeBatch(db);
            SKILLS.forEach((skill, index) => {
                const ref = doc(db, "skillMaster", String(index));
                batch.set(ref, skill);
            });
            await batch.commit();
            log(`✅ 完了！ ${SKILLS.length} 件を Firestore skillMaster に書き込みました。`, 'ok');
            log('TSVファイル（data/skills.tsv）は削除して構いません。', 'info');
        } catch (e) {
            log(`❌ エラー: ${e.message}`, 'err');
            btn.disabled = false;
        }
    };

    window.checkFirestore = async function() {
        document.getElementById('log').innerHTML = '';
        log('Firestore の skillMaster コレクションを確認中...', 'info');
        try {
            const snap = await getDocs(collection(db, "skillMaster"));
            if (snap.empty) {
                log('⚠ skillMaster コレクションが空です。マイグレーションを実行してください。', 'err');
            } else {
                const docs = snap.docs.sort((a, b) => parseInt(a.id) - parseInt(b.id));
                log(`✅ ${docs.length} 件のドキュメントが存在します。`, 'ok');
                docs.slice(0, 5).forEach(d => {
                    log(`  [${d.id}] ${d.data().symbol}  dd=${d.data().dd}  triple=${d.data().isTriple}`, 'info');
                });
                if (docs.length > 5) log(`  ... 他 ${docs.length - 5} 件`, 'info');
            }
        } catch (e) {
            log(`❌ エラー: ${e.message}`, 'err');
        }
    };
