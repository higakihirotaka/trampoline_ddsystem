<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trampoline Competition Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg-dark: #000c1a;
      --bg-panel: rgba(255,255,255,0.08);
      --accent-gold: #ffd700;
      --accent-cyan: #00f2ff;
      --text-white: #ffffff;
      --text-muted: #cbd5e0;
      --border-ui: rgba(0,242,255,0.2);
      --alert-red: #ff3d3d;
      --font-ui: "DIN 2014","DIN 2014 Demi","DIN 2014 Bold",
                 "DIN Alternate","DIN Condensed",
                 "Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",
                 system-ui,-apple-system,"Segoe UI",sans-serif;
      --left-col: 8cqw;
      --col-gap: 0.6cqw;
      --frame-pad-x: 3cqw;
    }
    @font-face { font-family:"DIN 2014"; src:url("./fonts/DIN2014-Regular.woff2") format("woff2"); font-weight:400; font-style:normal; font-display:swap; }
    @font-face { font-family:"DIN 2014"; src:url("./fonts/DIN2014-SemiBold.woff2") format("woff2"); font-weight:600; font-style:normal; font-display:swap; }
    @font-face { font-family:"DIN 2014"; src:url("./fonts/DIN2014-Bold.woff2") format("woff2"); font-weight:700; font-style:normal; font-display:swap; }
    @font-face { font-family:"DIN 2014"; src:url("./fonts/DIN2014-ExtraBold.woff2") format("woff2"); font-weight:800; font-style:normal; font-display:swap; }
    @font-face { font-family:"DIN 2014"; src:url("./fonts/DIN2014-Black.woff2") format("woff2"); font-weight:900; font-style:normal; font-display:swap; }
    html, body{
      margin:0; padding:0; height:100%; width:100%;
      background:#000; color:var(--text-white);
      font-family:var(--font-ui);
      overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    *{ box-sizing:border-box; }
    .num{
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
    }
    .monitor-frame{
      aspect-ratio: 16 / 9;
      width:100%;
      height:auto;
      max-width:100%;
      max-height:100%;
      background: radial-gradient(circle at 50% 0%, #001e3d 0%, #000810 100%);
      display:grid;
      grid-template-rows: 6.5% 17.5% 40% 10% 22% 4%;
      padding: 0 var(--frame-pad-x);
      border: 1px solid rgba(0,242,255,0.1);
      container-type: inline-size;
    }
    @supports not (width: 1cqw){
      :root{ --left-col: 8vw; --col-gap: 0.6vw; --frame-pad-x: 3vw; }
    }
    /* ===== アニメーション ===== */
    @keyframes enter {
      from { opacity: 0; transform: translateY(1.2cqh); filter: blur(2px); }
      to   { opacity: 1; transform: translateY(0);      filter: blur(0); }
    }
    .convention-header,.athlete-section,.ribbon-wrapper,.breakdown-row,.result-section,.footer-credits{
      opacity:0; animation: enter 2600ms ease-out forwards;
    }
    .convention-header{ animation-delay:    0ms; }
    .athlete-section  { animation-delay: 1400ms; }
    .ribbon-wrapper   { animation-delay: 2800ms; }
    .breakdown-row    { animation-delay: 4200ms; }
    .result-section   { animation-delay: 5600ms; }
    .footer-credits   { animation-delay: 7000ms; }
    /* スコア更新時はアニメなし */
    .monitor-frame.no-anim .convention-header,
    .monitor-frame.no-anim .athlete-section,
    .monitor-frame.no-anim .ribbon-wrapper,
    .monitor-frame.no-anim .breakdown-row,
    .monitor-frame.no-anim .result-section,
    .monitor-frame.no-anim .footer-credits{
      animation: none !important;
      opacity: 1 !important;
    }
    @media (prefers-reduced-motion: reduce){
      *{ animation:none !important; transition:none !important; }
      .convention-header,.athlete-section,.ribbon-wrapper,.breakdown-row,.result-section,.footer-credits{ opacity:1 !important; }
    }
    /* ===== 1. 大会名 ===== */
    .convention-header{
      border-bottom: 1.5px solid var(--border-ui);
      display:flex; align-items:center; justify-content:center;
      font-size: 1.1cqw; font-weight:700;
      letter-spacing: 0.8cqw;
      text-transform: uppercase;
      white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
    }
    /* ===== 2. 選手情報 ===== */
    .athlete-section{
      display:grid;
      grid-template-columns: var(--left-col) repeat(11, 1fr);
      column-gap: var(--col-gap);
      grid-template-rows: auto 1fr;
      align-items:end;
      padding-bottom: 2cqh;
      min-height:0;
    }
    .class-no{
      grid-column: 1 / 7; grid-row: 1;
      font-size: 1.8cqw; font-weight:800;
      color: var(--accent-gold);
      line-height: 1.1;
      white-space: nowrap;
      align-self:end;
      padding-bottom: 0.5cqh;
    }
    .session-info{
      grid-column: 8 / -1; grid-row: 1;
      text-align:right;
      color: var(--text-muted);
      font-size: 1cqw; font-weight:700;
      line-height: 1.3;
      white-space: nowrap;
      align-self:end;
      padding-bottom: 0.5cqh;
    }
    .athlete-identity-group{
      grid-column: 1 / -1; grid-row: 2;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      pointer-events:none;
      min-height:0;
      padding-bottom: 0.6cqh;
    }
    .athlete-name{
      font-size: 5.5cqw; font-weight:900;
      line-height: 0.9;
      letter-spacing: -2px;
      margin:0;
      white-space: nowrap;
      text-shadow: 0 0 30px rgba(0,242,255,0.2);
    }
    .athlete-team{
      font-size: 2.2cqw; font-weight:900;
      color: var(--text-white);
      margin-top: 1.35cqh;
      text-transform: uppercase;
      opacity: 0.95;
      letter-spacing: 0.15cqw;
      text-shadow: 0 0 22px rgba(0,242,255,0.15);
      line-height: 1.05;
    }
    /* ===== 3. リボン ===== */
    .ribbon-wrapper{
      display:grid;
      grid-template-columns: var(--left-col) repeat(11, 1fr);
      column-gap: var(--col-gap);
      align-items: stretch;
      padding-bottom: 1cqh;
      min-height:0;
    }
    .row-labels{
      display:grid;
      grid-template-rows: 12fr 50fr 19fr 19fr;
      row-gap:0;
      text-align:right;
      color: var(--text-muted);
      font-weight:900;
      font-size: 1.05cqw;
      min-height:0;
    }
    .row-title{
      display:flex; align-items:center; justify-content:flex-end;
      text-transform: uppercase;
      white-space: nowrap;
      letter-spacing: 0.06cqw;
    }
    .row-title.idx-label{ opacity:0.95; font-size: 0.95cqw; color:var(--text-white); }
    .row-title.e-label{ color:var(--text-white); }
    .row-title.d-sub-label{ font-size: 0.95cqw; opacity:0.9; }
    .skill-stack{
      display:grid;
      grid-template-rows: 12fr 50fr 19fr 19fr;
      row-gap:0;
      min-height:0;
    }
    .col-idx{
      grid-row:1;
      display:flex; align-items:center; justify-content:center;
      font-size: 0.9cqw; font-weight:900;
      color: var(--text-white);
      letter-spacing: 1px;
      min-width:0;
    }
    .card{
      background: var(--bg-panel);
      border: 1.5px solid var(--border-ui);
      border-radius: 4px;
      overflow:hidden;
      min-width:0; min-height:0;
      box-shadow: inset 0 0 15px rgba(0,242,255,0.03);
    }
    .card.e-card{
      grid-row:2;
      border-color: rgba(255,255,255,0.15);
      display:flex; align-items:stretch; justify-content:stretch;
    }
    .e-val{
      flex:1;
      display:flex; align-items:center; justify-content:center;
      font-size: 4.8cqw; font-weight:900;
      line-height:1;
    }
    .card.d-card{
      grid-row: 3 / 5;
      background: rgba(0,0,0,0.3);
      border-color: var(--border-ui);
      display:grid;
      grid-template-rows: 1fr 1fr;
      min-height:0;
    }
    .d-code{
      display:flex; align-items:center; justify-content:center;
      font-size: 1.8cqw; font-weight:900;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-ui);
      letter-spacing: -0.5px;
      background: rgba(255,255,255,0.02);
      white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
      padding: 0 6px;
      line-height:1;
    }
    .d-val{
      display:flex; align-items:center; justify-content:center;
      font-size: 2cqw; font-weight:900;
      line-height:1;
    }
    /* ===== LAN列 ===== */
    .skill-stack.bonus-style .col-idx{
      font-size: 0.95cqw;
      font-weight: 900;
      color: var(--text-white);
      text-transform: uppercase;
      letter-spacing: 0.2cqw;
    }
    .skill-stack.bonus-style .bonus-note-block{
      grid-row: 3;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      gap: 0.12cqh;
      padding-bottom: 0.35cqh;
      min-height:0;
      pointer-events:none;
      white-space: nowrap;
    }
    .skill-stack.bonus-style .bonus-note-block span{
      font-size: 0.82cqw;
      font-weight: 900;
      letter-spacing: 0.12cqw;
      text-transform: uppercase;
      line-height: 1;
      color: var(--accent-cyan);
      opacity: 0.95;
    }
    .skill-stack.bonus-style .bonus-dval{
      grid-row: 4;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:0;
    }
    .skill-stack.bonus-style .bonus-val{
      font-size: 2cqw;
      font-weight: 900;
      line-height: 1;
      color: var(--text-white);
    }
    /* ===== 4. 内訳 ===== */
    .breakdown-row{
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2cqw;
      border-top: 2.5px solid var(--border-ui);
      border-bottom: 2.5px solid var(--border-ui);
      align-items:center;
      background: rgba(0,242,255,0.02);
      min-height:0;
    }
    .stat-item{ display:flex; align-items:center; gap: 1.2cqw; height:100%; }
    .stat-item label{
      font-size: 1cqw; font-weight:800;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .stat-item .val{
      font-size: 3.8cqw; font-weight:900;
      letter-spacing: -1.5px;
      line-height:1;
    }
    /* ===== 5. 結果 ===== */
    .result-section{
      display:grid;
      grid-template-columns: 50% 50%;
      align-items:center;
      min-height:0;
    }
    .routine-totals{
      display:flex;
      gap: 3cqw;
      align-items:flex-end;
      min-height:0;
    }
    .routine-box{ display:flex; flex-direction:column; align-items:flex-start; }
    .routine-box label{
      font-size: 1cqw;
      color: var(--text-muted);
      font-weight:800;
      margin-bottom: 0.25cqh;
    }
    .routine-box .val{
      font-size: 5.6cqw;
      font-weight:800;
      color: rgba(255,255,255,0.10);
      line-height:1;
      letter-spacing: -1.5px;
    }
    .routine-box.active label{ color: var(--accent-gold); }
    .routine-box.active .val{
      color: rgba(255,255,255,0.85);
      border-bottom: 6px solid rgba(255,215,0,0.85);
      padding-bottom: 3px;
      text-shadow: 0 0 14px rgba(255,215,0,0.18);
    }
    .final-results{
      display:flex;
      justify-content:flex-end;
      align-items:flex-end;
      gap: 4cqw;
      padding-bottom: 1.5cqh;
      min-height:0;
    }
    .score-unit{ display:flex; align-items:flex-end; gap: 1cqw; }
    .score-unit label{
      font-size: 1.2cqw;
      color: var(--accent-gold);
      font-weight:900;
      margin-bottom: 1.2cqw;
      white-space: nowrap;
    }
    .total-val{ font-size: 8.5cqw; font-weight:900; line-height:1; letter-spacing:-2px; }
    .rank-val{ font-size: 10.5cqw; font-weight:900; color: var(--accent-gold); line-height:1; }
    /* ===== 6. クレジット ===== */
    .footer-credits{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      font-size: 0.8cqw;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.2cqw;
      font-weight:700;
      text-transform: uppercase;
      min-height:0;
    }
    .alert{ color: var(--alert-red) !important; }
    .repeat{ color: var(--alert-red) !important; font-weight:900; }
    /* ===== 待機状態 ===== */
    .waiting-msg{
      grid-column: 1 / -1; grid-row: 1 / -1;
      display:flex; align-items:center; justify-content:center;
      font-size: 1.5cqw; font-weight:700;
      letter-spacing: 0.4cqw;
      text-transform: uppercase;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="monitor-frame no-anim" id="monitor">
    <div class="convention-header" id="event-name-el" style="opacity:1;">---</div>
    <div class="athlete-section" style="opacity:1;">
      <div class="waiting-msg">WAITING FOR JUDGE CONFIRMATION</div>
    </div>
    <div class="ribbon-wrapper" style="opacity:1;"></div>
    <div class="breakdown-row" style="opacity:1;"></div>
    <div class="result-section" style="opacity:1;"></div>
    <footer class="footer-credits" style="opacity:1;">SYSTEM DESIGN &amp; DEVELOPMENT BY HIROTAKA.H</footer>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, getDocs, collection, query, where, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBhSJsTmnzBCFrHuXuB8zGUTiQauOS96m4",
    authDomain: "trampoline-dd-test.firebaseapp.com",
    projectId: "trampoline-dd-test"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const params    = new URLSearchParams(location.search);
  const eventId   = params.get('event')?.trim();
  let skillMaster = [], athleteMap = {}, tournamentName = '---';
  let lastResultId = null;

  // ---- ラベル ----
  function getRoundLabel(rid) {
    const labels = { pre1:'QUALIFYING ROUND 1', pre2:'QUALIFYING ROUND 2', final:'FINAL ROUND' };
    return labels[rid] || rid.toUpperCase();
  }

  // ---- 中間2名の和 ----
  function mid2sum(vals) {
    const filled = vals.filter(v => v !== null && v !== undefined);
    if (filled.length < 2) return 0;
    filled.sort((a, b) => a - b);
    const mid = Math.floor((filled.length - 2) / 2);
    return filled[mid] + filled[mid + 1];
  }

  // ---- パネル別審判データ取得 ----
  function getPanelJudges(resData) {
    const allJudges = resData.execution?.judges || {};
    if (Object.keys(allJudges).length === 0) return null;
    const byPanel = {};
    Object.entries(allJudges).forEach(([k, v]) => {
      const p    = k.split('_')[0];
      const jKey = k.slice(p.length + 1);
      if (!byPanel[p]) byPanel[p] = {};
      byPanel[p][jKey] = v;
    });
    return Object.values(byPanel).reduce(
      (best, cur) => Object.keys(cur).length > Object.keys(best).length ? cur : best, {}
    );
  }

  // ---- 技ごとのE減点 ----
  function getSkillEDed(panelJudges, si) {
    if (!panelJudges) return null;
    const jKeys = Object.keys(panelJudges);
    if (jKeys.length < 2) return null;
    const vals = jKeys.map(k => panelJudges[k]?.deductions?.[si] ?? null);
    return mid2sum(vals);
  }

  // ---- 着地E減点 ----
  function getLandingDed(panelJudges) {
    if (!panelJudges) return null;
    const jKeys = Object.keys(panelJudges);
    if (jKeys.length < 2) return null;
    const vals = jKeys.map(k => panelJudges[k]?.landing ?? null);
    return mid2sum(vals);
  }

  // ---- E合計スコア ----
  function calcMedE(resData) {
    if (resData.officialE !== undefined && resData.officialE !== null) return resData.officialE;
    const panelJudges = getPanelJudges(resData);
    if (!panelJudges) return null;
    const jKeys  = Object.keys(panelJudges);
    if (jKeys.length < 2) return null;
    const vLimit = resData.validCount ?? 10;
    let totalDed = 0;
    for (let si = 0; si < vLimit; si++) {
      const vals = jKeys.map(k => panelJudges[k]?.deductions?.[si] ?? null);
      totalDed += mid2sum(vals);
    }
    if (vLimit === 10) {
      const lVals = jKeys.map(k => panelJudges[k]?.landing ?? null);
      totalDed += mid2sum(lVals);
    }
    return vLimit * 2.0 - totalDed;
  }

  // ---- 選手の他ラウンド結果取得 ----
  async function getAthleteResults(athleteId) {
    if (!eventId || !athleteId) return {};
    try {
      const q    = query(collection(db, "results"), where("eventId", "==", eventId), where("athleteId", "==", athleteId));
      const snap = await getDocs(q);
      const res  = {};
      snap.docs.forEach(d => {
        const data = d.data();
        if (data.officialTotal !== undefined) res[data.round] = data.officialTotal;
      });
      return res;
    } catch { return {}; }
  }

  // ---- 順位計算 ----
  async function calcRank(round, classVal, genderVal, total) {
    if (total === null || total === undefined) return null;
    try {
      const q    = query(collection(db, "results"), where("eventId", "==", eventId), where("round", "==", round), where("published", "==", true));
      const snap = await getDocs(q);
      let rank = 1;
      snap.docs.forEach(d => {
        const data = d.data();
        const ath  = athleteMap[data.athleteId];
        if (ath && ath.class === classVal && ath.gender === genderVal) {
          if ((data.officialTotal ?? 0) > total) rank++;
        }
      });
      return rank;
    } catch { return null; }
  }

  // ---- メインレンダリング ----
  async function renderFocusResult(resultDoc) {
    const isNew   = resultDoc.id !== lastResultId;
    lastResultId  = resultDoc.id;
    const resData = resultDoc.data();
    const ath     = athleteMap[resData.athleteId] || {};

    // 提出データ取得
    const subId   = `${eventId}_${resData.athleteId}_${resData.round}`;
    const subSnap = await getDoc(doc(db, "submissions", subId));
    const sub     = subSnap.exists() ? subSnap.data() : { skills: [] };

    const vLimit        = resData.validCount ?? 10;
    const officialSkills= resData.officialSkills || [];
    const panelJudges   = (resData.officialE === undefined || resData.officialE === null)
                          ? getPanelJudges(resData) : null;

    // ---- 技ごとデータ計算 ----
    const seenIds = new Set();
    let baseDD = 0, tripleCount = 0, hasAnyDiff = false;

    const skillCols = [];
    for (let i = 0; i < 10; i++) {
      if (i >= vLimit) {
        skillCols.push(`
          <div class="skill-stack" style="opacity:0.25;">
            <div class="col-idx num">${String(i+1).padStart(2,'0')}</div>
            <div class="card e-card"><div class="e-val num" style="color:var(--text-muted);">--</div></div>
            <div class="card d-card">
              <div class="d-code">-</div>
              <div class="d-val num">-</div>
            </div>
          </div>`);
        continue;
      }

      const offId      = officialSkills[i];
      const skill      = skillMaster.find(m => m.id === String(offId));
      const subRaw     = sub.skills?.[i] || '';
      const subSkillRaw= (typeof subRaw === 'object' && subRaw !== null) ? subRaw.skill : subRaw;
      const subSkill   = isNaN(subSkillRaw)
                         ? skillMaster.find(m => m.symbol === subSkillRaw)
                         : skillMaster.find(m => m.id === String(subSkillRaw));

      const isDiff  = !!(skill && subSkill && skill.symbol !== subSkill.symbol);
      const isRepeat= !!(skill && seenIds.has(String(offId)));
      if (isDiff) hasAnyDiff = true;

      let displayDD = 0;
      if (skill && !isRepeat) {
        displayDD = skill.dd;
        baseDD   += skill.dd;
        if (skill.isTriple) tripleCount++;
        seenIds.add(String(offId));
      }

      const eDedVal  = getSkillEDed(panelJudges, i);
      const eDisplay = eDedVal !== null ? eDedVal.toFixed(1) : '--';
      const hasAlert = isDiff || isRepeat;
      const dCodeTxt = skill ? skill.symbol : '-';
      const dValTxt  = skill ? (isRepeat ? '0.0' : displayDD.toFixed(1)) : '-';

      skillCols.push(`
        <div class="skill-stack">
          <div class="col-idx num">${String(i+1).padStart(2,'0')}</div>
          <div class="card e-card"><div class="e-val num${hasAlert ? ' alert' : ''}">${eDisplay}</div></div>
          <div class="card d-card">
            <div class="d-code${hasAlert ? ' alert' : ''}">${dCodeTxt}</div>
            <div class="d-val num${hasAlert ? ' alert' : ''}">${dValTxt}</div>
          </div>
        </div>`);
    }

    // ---- ボーナス計算 ----
    let bonus = 0;
    if (ath.gender === '男子' && tripleCount >= 5) bonus = (tripleCount - 4) * 0.3;
    else if (ath.gender === '女子' && tripleCount >= 3) bonus = (tripleCount - 2) * 0.3;
    const finalDD = baseDD + bonus;

    // LAN列
    const landDed = getLandingDed(panelJudges);
    const bonusCol = `
      <div class="skill-stack bonus-style">
        <div class="col-idx">LAN</div>
        <div class="card e-card"><div class="e-val num">${landDed !== null ? landDed.toFixed(1) : '--'}</div></div>
        <div class="bonus-note-block">
          <span>D-SCORE</span>
          <span>BONUS</span>
        </div>
        <div class="bonus-dval">
          <span class="bonus-val num">+${bonus.toFixed(1)}</span>
        </div>
      </div>`;

    // ---- スコア集計 ----
    const dScore = resData.officialD     !== undefined ? resData.officialD     : finalDD;
    const eScore = calcMedE(resData);
    const tScore = resData.tof           !== undefined ? resData.tof           : null;
    const hdScore= resData.hd?.total     !== undefined ? resData.hd?.total     : null;
    const pScore = resData.penalty       !== undefined ? resData.penalty       : 0;

    let totalScore = null;
    if (resData.officialTotal !== undefined) {
      totalScore = resData.officialTotal;
    } else if (eScore !== null && tScore !== null && hdScore !== null) {
      totalScore = Math.max(0, dScore + eScore + tScore + hdScore - pScore);
    }

    const isPublished = resData.published === true;
    const fmt1 = v => (v !== null && v !== undefined) ? Number(v).toFixed(1) : '--';
    const fmt3 = v => (v !== null && v !== undefined) ? Number(v).toFixed(3) : '--';

    // ---- 他ラウンド結果 & 順位 ----
    const [athResults, rank] = await Promise.all([
      getAthleteResults(resData.athleteId),
      calcRank(resData.round, ath.class, ath.gender, totalScore)
    ]);

    // ---- ルーティン合計 ----
    let routineTotalsHTML = '';
    if (resData.round === 'pre1' || resData.round === 'pre2') {
      const r1 = athResults['pre1'];
      const r2 = athResults['pre2'];
      routineTotalsHTML = `
        <div class="routine-box${resData.round === 'pre1' ? ' active' : ''}">
          <label>ROUTINE 1</label>
          <div class="val num">${r1 !== undefined ? Number(r1).toFixed(3) : '--'}</div>
        </div>
        <div class="routine-box${resData.round === 'pre2' ? ' active' : ''}">
          <label>ROUTINE 2</label>
          <div class="val num">${r2 !== undefined ? Number(r2).toFixed(3) : '--'}</div>
        </div>`;
    } else {
      routineTotalsHTML = `
        <div class="routine-box active">
          <label>FINAL</label>
          <div class="val num">${fmt3(totalScore)}</div>
        </div>`;
    }

    // ---- セッション情報 ----
    const dateStr    = new Date().toLocaleDateString('ja-JP').replace(/\//g, '.');
    const groupStr   = ath.flightGroup ? `PANEL ${ath.flightGroup}` : '';
    const sessionLine2 = [groupStr, dateStr].filter(Boolean).join(' | ');
    const classGender  = [ath.class, ath.gender].filter(Boolean).join(' ');

    // ---- フルHTML生成 ----
    const html = `
      <div class="convention-header">${tournamentName}</div>

      <div class="athlete-section">
        <div class="class-no">${classGender} / No.${ath.order || '?'}</div>
        <div class="session-info">
          ${getRoundLabel(resData.round)}<br>
          ${sessionLine2}
        </div>
        <div class="athlete-identity-group">
          <h1 class="athlete-name">${ath.name1 || '---'}</h1>
          <div class="athlete-team">${ath.club1 || '---'}</div>
        </div>
      </div>

      <div class="ribbon-wrapper">
        <div class="row-labels">
          <div class="row-title idx-label">Skill No</div>
          <div class="row-title e-label">E-Deduction</div>
          <div class="row-title d-sub-label">Skill Code</div>
          <div class="row-title d-sub-label">D-Score</div>
        </div>
        ${skillCols.join('')}
        ${bonusCol}
      </div>

      <div class="breakdown-row">
        <div class="stat-item"><label>Exec.</label><div class="val num${hasAnyDiff ? ' alert':''}">${fmt1(eScore)}</div></div>
        <div class="stat-item"><label>Diff.</label><div class="val num${hasAnyDiff ? ' alert':''}">${fmt1(dScore)}</div></div>
        <div class="stat-item"><label>ToF</label><div class="val num">${fmt3(tScore)}</div></div>
        <div class="stat-item"><label>HD</label><div class="val num">${fmt3(hdScore)}</div></div>
        <div class="stat-item"><label>Penalty</label><div class="val num">${fmt1(pScore > 0 ? pScore : null)}</div></div>
      </div>

      <div class="result-section">
        <div class="routine-totals">${routineTotalsHTML}</div>
        <div class="final-results">
          <div class="score-unit">
            <label>${isPublished ? 'TOTAL' : 'TOTAL*'}</label>
            <div class="total-val num${hasAnyDiff ? ' alert':''}">${fmt3(totalScore)}</div>
          </div>
          <div class="score-unit">
            <label>RANK</label>
            <div class="rank-val num">${rank !== null ? rank : '--'}</div>
          </div>
        </div>
      </div>

      <footer class="footer-credits">SYSTEM DESIGN &amp; DEVELOPMENT BY HIROTAKA.H</footer>`;

    const monitor = document.getElementById('monitor');
    if (isNew) {
      monitor.classList.remove('no-anim');
    } else {
      monitor.classList.add('no-anim');
    }
    monitor.innerHTML = html;
  }

  // ---- 初期化 ----
  async function init() {
    if (!eventId) return;
    try {
      const [smSnap, athSnap, tourSnap] = await Promise.all([
        getDocs(collection(db, "skillMaster")),
        getDocs(collection(db, "tournaments", eventId, "athletes")),
        getDoc(doc(db, "tournaments", eventId))
      ]);

      skillMaster = smSnap.docs
        .sort((a, b) => parseInt(a.id) - parseInt(b.id))
        .map(d => ({
          id      : d.id,
          symbol  : d.data().symbol,
          dd      : parseFloat(d.data().dd) || 0,
          isTriple: d.data().isTriple === true,
          direction: d.data().direction || ''
        }));

      athSnap.forEach(d => athleteMap[d.id] = d.data());

      if (tourSnap.exists()) {
        tournamentName = tourSnap.data().name || '---';
        document.getElementById('event-name-el').textContent = tournamentName;
      }

      const q = query(
        collection(db, "results"),
        where("eventId", "==", eventId),
        where("published", "==", true),
        orderBy("publishedAt", "desc"),
        limit(1)
      );
      onSnapshot(q, snap => { if (!snap.empty) renderFocusResult(snap.docs[0]); });

    } catch (e) { console.error(e); }
  }

  init();
</script>
</body>
</html>
